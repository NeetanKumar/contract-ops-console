services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}@host.docker.internal:5432/contract_ops_console?schema=public
      PORT: 4000
      CORS_ORIGIN: http://localhost:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "8080:80"
    depends_on:
      - backend
